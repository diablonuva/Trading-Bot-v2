version: "3.9"

# Trading-Bot-v2 — Full stack
# Pi 5 deployment: 192.168.0.12
# Dashboard accessible at: http://192.168.0.12:3200
#
# Services:
#   postgres  — PostgreSQL 16 (telemetry + trade data)
#   api       — Node.js / Express / Prisma (REST + WebSocket)
#   dashboard — React app (Vite build served via nginx)
#   bot       — Python trading bot (Alpaca)
#   nginx     — Reverse proxy on port 3200

services:
  # -------------------------------------------------------
  # Database
  # -------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tradingbot
      POSTGRES_USER: ${POSTGRES_USER:-trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading} -d tradingbot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # -------------------------------------------------------
  # Node.js API (REST + WebSocket)
  # -------------------------------------------------------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD}@postgres:5432/tradingbot
      NODE_ENV: production
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api/prisma:/app/prisma  # allow schema access without rebuild
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # -------------------------------------------------------
  # Python Trading Bot
  # -------------------------------------------------------
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: America/New_York
      API_BASE_URL: http://api:4000
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./bot/logs:/app/logs
      - ./bot/data:/app/data
      - ./bot/config:/app/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://api:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - internal

  # -------------------------------------------------------
  # React Dashboard (static build served by nginx)
  # -------------------------------------------------------
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - internal

  # -------------------------------------------------------
  # Nginx — reverse proxy, port 3200 externally
  # -------------------------------------------------------
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "3200:80"         # http://192.168.0.12:3200
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - dashboard
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
