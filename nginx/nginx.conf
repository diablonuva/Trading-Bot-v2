worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml application/xml;

    # Use Docker's embedded DNS so we re-resolve container IPs on each request.
    # This prevents the "502 after recreating api/dashboard" trap where nginx
    # cached the old container IP at startup.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        # ---- API proxy (REST) ----------------------------------------
        location /api/ {
            set $api_upstream http://api:4000;
            proxy_pass         $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ---- API health check ----------------------------------------
        location /health {
            set $api_upstream http://api:4000;
            proxy_pass $api_upstream/health;
        }

        # ---- WebSocket (real-time dashboard updates) -----------------
        location /ws {
            set $api_upstream http://api:4000;
            proxy_pass             $api_upstream;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade    $http_upgrade;
            proxy_set_header       Connection "Upgrade";
            proxy_set_header       Host       $host;
            proxy_read_timeout     3600s;
            proxy_send_timeout     3600s;
        }

        # ---- Telemetry (bot → API, internal only) --------------------
        location /telemetry/ {
            set $api_upstream http://api:4000;
            proxy_pass         $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ---- React SPA -----------------------------------------------
        location / {
            set $dashboard_upstream http://dashboard:80;
            proxy_pass         $dashboard_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }
    }
}
