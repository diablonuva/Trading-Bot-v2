name: Docker Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API
        uses: docker/build-push-action@v5
        with:
          context: ./api
          platforms: linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-bot:
    name: Build Bot image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Bot
        uses: docker/build-push-action@v5
        with:
          context: ./bot
          platforms: linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-dashboard:
    name: Build Dashboard image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          platforms: linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
